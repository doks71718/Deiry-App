<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  overflow:hidden;
}
.container{
  text-align:center;
  animation:fadeIn 1.5s ease;
}h1{ margin-bottom:25px; font-size:32px; }

.button{ display:block; margin:12px auto; padding:14px 30px; font-size:16px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); color:white; cursor:pointer; transition:all .3s ease; }

.button:hover{ transform:scale(1.05); background:rgba(255,255,255,0.12); }

@keyframes fadeIn{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.fade-out{ animation:fadeOut 0.8s forwards; }

@keyframes fadeOut{ from{opacity:1} to{opacity:0} }

.success{ display:none; font-size:20px; animation:fadeIn 1s ease; } </style>

</head><body><div class="container" id="main">
<h1>Verificação de Segurança</h1>
<button class="button" onclick="verify()">Verificar</button>
<button class="button">Entrar no Discord</button>
</div><div class="success" id="success">
✅ Verificação concluída!
</div><script>
function verify(){
  const main = document.getElementById("main");
  const success = document.getElementById("success");

  main.classList.add("fade-out");

  setTimeout(()=>{
    main.style.display="none";
    success.style.display="block";
  },700);
}
</script></body>
</html>
